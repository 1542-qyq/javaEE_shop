<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>订单提交成功</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" type="text/css" th:href="@{/css/userIndex.css}"/>
  <style>
    .success-container {
      margin-top: 50px;
      text-align: center;
    }
    .success-icon {
      font-size: 80px;
      color: #28a745;
      margin-bottom: 20px;
    }
    .order-number {
      font-size: 24px;
      color: #e4393c;
      font-weight: bold;
      margin: 20px 0;
    }
    .order-amount {
      font-size: 20px;
      color: #333;
      margin: 15px 0;
    }
    .action-buttons {
      margin-top: 40px;
    }
  </style>
</head>
<body>
<!-- 导航栏 -->
<nav class="navbar navbar-expand-lg cat-navbar">
  <div class="container">
    <a class="navbar-brand" th:href="@{/}">电商平台</a>

    <!-- 折叠按钮 -->
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
        <!-- 搜索框 -->
        <form class="form-inline my-2 my-lg-0 ml-auto mr-auto" th:action="@{/goods/search}" method="get" style="margin-bottom: 1rem !important;">
            <input class="form-control mr-sm-2" type="search"
                   name="keyword" placeholder="搜索商品..." style="width: 250px; border-radius: 30px;">
            <button class="btn btn-primary my-2 my-sm-0" type="submit" style="margin-left: 0.5rem;">搜索</button>
        </form>

        <!-- 导航链接 -->
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/goods/list}">商品列表</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/cart/view}">购物车</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/order/myOrders}">我的订单</a>
            </li>
            <!-- 后台管理入口 -->
            <li class="nav-item" th:if="${session.auser != null}">
                <a class="nav-link" th:href="@{/admin/index}">
                    后台管理
                </a>
            </li>
        </ul>
    </div>
  </div>
</nav>

<div class="container success-container">
  <div class="success-icon">✅</div>
  <h2>订单提交成功！</h2>

  <div class="card success-info mx-auto" style="max-width: 600px;">
    <div class="card-body">
      <p class="lead">感谢您的购买！</p>

      <div class="order-number">
        订单号:<span th:text="${orderId}"></span>
      </div>

      <div class="order-amount">
        订单金额:¥<span th:text="${#numbers.formatDecimal(orderAmount, 1, 2)}"></span>
      </div>

      <p class="text-muted">
        您可以在"我的订单"中查看订单状态
      </p>
    </div>
  </div>

  <div class="action-buttons">
    <a th:href="@{/order/myOrders}" class="btn btn-primary btn-lg">
      <i class="fas fa-list"></i> 查看我的订单
    </a>
    <a th:href="@{/goods/list}" class="btn btn-outline-secondary btn-lg ml-3">
      <i class="fas fa-shopping-cart"></i> 继续购物
    </a>
  </div>

  <div class="mt-4 text-muted">
    <p>如有任何问题，请联系客服</p>
  </div>
</div>

<footer class="bg-dark text-white py-4 mt-5">
    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <h5>电商平台</h5>
                <p class="text-light">为您提供优质的商品和服务</p>
            </div>
            <div class="col-md-6 text-right">
                <p>© 2025 电商平台. -23覃海霞-01邱彦琦-.</p>
            </div>
        </div>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.min.js"></script>
</body>
</html>
