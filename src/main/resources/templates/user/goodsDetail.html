<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${goods.gname} + ' - 商品详情'">商品详情</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" th:href="@{/css/userIndex.css}"/>
    <style>
        .goods-detail-container {
            margin-top: 20px;
        }
        .goods-images {
            padding: 20px;
            text-align: center;
        }
        .goods-images img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
        }
        .goods-info {
            padding-left: 30px;
        }
        .goods-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }
        .goods-price {
            color: #a59aca;
            font-size: 28px;
            font-weight: bold;
            margin: 20px 0;
        }
        .goods-attribute {
            margin: 15px 0;
        }
        .goods-attribute dt {
            font-weight: normal;
            color: #666;
            width: 100px;
            float: left;
        }
        .goods-attribute dd {
            margin-left: 110px;
        }
        .action-buttons {
            margin-top: 30px;
        }
        .stock-status {
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            font-size: 14px;
            font-weight: bold;
        }
        .in-stock {
            background-color: #e8f5e9;
            color: #4caf50;
            border: 1px solid #c8e6c9;
        }
        .out-of-stock {
            background-color: #ffebee;
            color: #f44336;
            border: 1px solid #ffcdd2;
        }
    </style>
</head>
<body>
<!-- 导航栏 -->
<nav class="navbar navbar-expand-lg cat-navbar">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">电商平台</a>

        <!-- 折叠按钮 -->
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <!-- 导航链接 -->
            <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/goods/list}">返回商品列表</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/cart/view}">
                        购物车
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link current-page" th:href="@{/order/myOrders}">
                        我的订单</a>
                </li>
                <!-- 后台管理入口 -->
                <li class="nav-item" th:if="${session.auser != null}">
                    <a class="nav-link" th:href="@{/admin/index}">
                        后台管理
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container goods-detail-container">
    <!-- 面包屑导航 -->
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/goods/list}">商品列表</a></li>
            <li class="breadcrumb-item active" th:text="${goods.gname}"></li>
        </ol>
    </nav>
    <!-- 商品详情 -->
    <div class="row">
        <!-- 商品图片 -->
        <div class="col-md-6">
            <div class="card goods-images">
                <div class="card-body">
                    <img th:src="${goods.imageUrl}" th:alt="${goods.gname}">
                </div>
            </div>
        </div>

        <!-- 商品信息 -->
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h1 class="goods-title" th:text="${goods.gname}"></h1>

                    <div class="goods-price">
                        ¥<span th:text="${goods.gprice}"></span>
                    </div>

                    <dl class="goods-attribute">
                        <div class="row mb-3">
                            <dt class="col-4">商品编号:</dt>
                            <dd class="col-4" th:text="${goods.id}"></dd>
                        </div>

                        <div class="row mb-3">
                            <dt class="col-4">库存状态:</dt>
                            <dd class="col-4">
                                    <span th:if="${goods.isInStock()}"
                                          class="stock-status in-stock">
                                        有货
                                        <span th:text="'（库存:' + ${goods.gstore} + '件）'"></span>
                                    </span>
                                <span th:unless="${goods.isInStock()}"
                                      class="stock-status out-of-stock">
                                        缺货
                                    </span>
                            </dd>
                        </div>

                        <div class="row mb-3" th:if="${goods.typename}">
                            <dt class="col-4">商品分类:</dt>
                            <dd class="col-4" th:text="${goods.typename}"></dd>
                        </div>
                    </dl>

                    <!-- 操作按钮 -->
                    <div class="action-buttons">
                        <div th:if="${goods.isInStock()}">
                            <button class="btn btn-primary btn-lg mr-3" onclick="addToCart(this)"
                                    th:data-goods-id="${goods.id}"
                                    th:data-cart-url="@{/cart/add}"
                                    th:data-login-url="@{/user/toLogin}">
                                加入购物车
                            </button>
                            <button class="btn btn-danger btn-lg">
                                立即购买
                            </button>
                        </div>
                        <div th:unless="${goods.isInStock()}">
                            <button class="btn btn-secondary btn-lg" disabled>
                                到货通知
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- 页脚 -->
<footer class="bg-dark text-white py-4 mt-5">
    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <h5>电商平台</h5>
                <p class="text-light">为您提供优质的商品和服务</p>
            </div>
            <div class="col-md-6 text-right">
                <p>© 2025 电商平台. -23覃海霞-01邱彦琦-.</p>
            </div>
        </div>
    </div>
</footer>
<!-- 在goodsDetail.html中添加购物车相关JS -->
<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.min.js"></script>
<script>
    function addToCart(button) {
        // 检查用户是否登录
        var isLoggedIn = [[${session.buser != null}]] === true;

        if (!isLoggedIn) {
            if (confirm('请先登录才能加入购物车，是否前往登录？')) {
                window.location.href = button.getAttribute('data-login-url');
            }
            return;
        }

        var goodsId = button.getAttribute('data-goods-id');
        var quantity = 1;

        // 显示加载中
        var originalText = button.innerHTML;
        button.innerHTML = '添加中...';
        button.disabled = true;

        // 使用fetch API替代jQuery ajax
        fetch(button.getAttribute('data-cart-url'), {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: `goodsId=${encodeURIComponent(goodsId)}&quantity=${encodeURIComponent(quantity)}`
        })
        .then(response => response.text())
        .then(response => {
            var parts = response.split(':');
            if (parts[0] === 'success') {
                alert(parts[1]);
            } else {
                alert('错误:' + parts[1]);
            }
        })
        .catch(error => {
            alert('网络错误，请稍后重试');
        })
        .finally(() => {
            button.innerHTML = originalText;
            button.disabled = false;
        });
    }
    
    // 导航栏链接高亮
    document.addEventListener('DOMContentLoaded', function() {
        const navLinks = document.querySelectorAll('.nav-link');
        const currentPath = window.location.pathname;
        
        navLinks.forEach(link => {
            if (link.getAttribute('href') && currentPath.includes(link.getAttribute('href'))) {
                link.classList.add('current-page');
            } else {
                link.classList.remove('current-page');
            }
        });
    });
</script>
</body>
</html>
