<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>订单确认</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" type="text/css" th:href="@{/css/userIndex.css}"/>
  <style>
    .order-container {
      margin-top: 20px;
    }
    .order-section {
      margin-bottom: 20px;
    }
    .order-section-title {
      border-bottom: 2px solid #a59aca;
      padding-bottom: 10px;
      margin-bottom: 20px;
      color: #333;
      font-weight: bold;
    }
    .order-items {
      margin-bottom: 30px;
    }
    .order-item {
      margin-bottom: 15px;
      display: flex;
      align-items: center;
    }
    .order-item-image {
      width: 80px;
      height: 80px;
      overflow: hidden;
      margin-right: 15px;
      border-radius: 5px;
    }
    .order-item-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .order-item-info {
      flex: 1;
    }
    .order-item-name {
      font-weight: bold;
      margin-bottom: 5px;
    }
    .order-item-price {
      color: #666;
      margin-bottom: 5px;
    }
    .order-item-quantity {
      color: #666;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }
    .summary-total {
      font-size: 20px;
      font-weight: bold;
      color: #a59aca;
    }
    .action-buttons {
      margin-top: 30px;
      text-align: center;
    }
    .btn-submit {
      padding: 12px 50px;
      font-size: 18px;
    }
    /* 面包屑导航样式 */
    .breadcrumb {
      background-color: transparent;
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
      border-radius: 0.25rem;
      font-size: 14px;
    }
    .breadcrumb-item.active {
      color: #a59aca;
      font-weight: bold;
    }
    .breadcrumb-item a {
      color: #6c757d;
    }
    .breadcrumb-item a:hover {
      color: #a59aca;
      text-decoration: none;
    }
  </style>
</head>
<body>
<!-- 导航栏 -->
<nav class="navbar navbar-expand-lg cat-navbar">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">电商平台</a>
        
        <!-- 折叠按钮 -->
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        
        <div class="collapse navbar-collapse" id="navbarNav">
            <!-- 搜索框 -->
            <form class="form-inline my-2 my-lg-0 ml-auto mr-auto" th:action="@{/goods/search}" method="get" style="margin-bottom: 1rem !important;">
                <input class="form-control mr-sm-2" type="search"
                       name="keyword" placeholder="搜索商品..." style="width: 250px; border-radius: 30px;">
                <button class="btn btn-primary my-2 my-sm-0" type="submit" style="margin-left: 0.5rem;">搜索</button>
            </form>

            <!-- 导航链接 -->
            <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/goods/list}">商品列表</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/cart/view}">购物车</a>
                </li>
                <!-- 后台管理入口 -->
                <li class="nav-item" th:if="${session.auser != null}">
                    <a class="nav-link" th:href="@{/admin/index}">
                        后台管理
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container order-container">
  <!-- 面包屑导航 -->
  <nav aria-label="breadcrumb">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a th:href="@{/}">首页</a></li>
      <li class="breadcrumb-item"><a th:href="@{/cart/view}">购物车</a></li>
      <li class="breadcrumb-item active">订单确认</li>
    </ol>
  </nav>

  <!-- 页面标题 -->
  <h2 class="text-center mb-4">订单确认</h2>

  <!-- 错误信息 -->
  <div th:if="${errorMessage}" class="alert alert-danger">
    <span th:text="${errorMessage}"></span>
  </div>

  <!-- 订单商品 -->
  <div class="order-section">
    <div class="card">
      <div class="card-body">
        <h4 class="order-section-title">商品清单</h4>
        <div class="order-items">
          <div th:each="cartItem : ${cartItems}" class="card order-item">
            <div class="card-body">
              <div class="order-item-image">
                <img th:src="${cartItem.goods.imageUrl}" th:alt="${cartItem.goods.gname}">
              </div>
              <div class="order-item-info">
                <div class="order-item-name" th:text="${cartItem.goods.gname}"></div>
                <div class="order-item-price">
                  单价:¥<span th:text="${cartItem.goods.gprice}"></span>
                </div>
                <div class="order-item-quantity">
                  数量:<span th:text="${cartItem.shoppingnum}"></span> 件
                </div>
              </div>
              <div class="text-right">
                <div class="font-weight-bold">
                  小计:¥<span th:text="${#numbers.formatDecimal(cartItem.subtotal, 1, 2)}"></span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 订单汇总 -->
  <div class="order-section">
    <div class="card">
      <div class="card-body">
        <h4 class="order-section-title">订单汇总</h4>
        <div class="order-summary">
          <div class="summary-row">
            <span>商品件数:</span>
            <span><span th:text="${itemCount}"></span> 件</span>
          </div>
          <div class="summary-row">
            <span>商品总金额:</span>
            <span>¥<span th:text="${#numbers.formatDecimal(totalAmount, 1, 2)}"></span></span>
          </div>
          <div class="summary-row">
            <span>运费:</span>
            <span>¥0.00</span>
          </div>
          <div class="summary-row summary-total">
            <span>应付总额:</span>
            <span>¥<span th:text="${#numbers.formatDecimal(totalAmount, 1, 2)}"></span></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 收货信息（简化版） -->
  <div class="order-section">
    <div class="card">
      <div class="card-body">
        <h4 class="order-section-title">收货信息</h4>
        <div class="alert alert-info">
          <p>请确保您的收货信息正确，如有需要请到个人中心修改</p>
          <p class="mb-0">注:订单提交后不可修改收货地址</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 提交订单 -->
  <div class="action-buttons">
    <form th:action="@{/order/submit}" method="post">
      <button type="submit" class="btn btn-danger btn-submit">
        <i class="fas fa-check-circle"></i> 提交订单
      </button>
      <a th:href="@{/cart/view}" class="btn btn-secondary btn-lg ml-3">
        <i class="fas fa-arrow-left"></i> 返回修改
      </a>
    </form>
    <p class="text-muted mt-3">
      点击"提交订单"即表示您同意我们的购买条款和条件
    </p>
  </div>
</div>
<!-- 页脚 -->
<footer class="bg-dark text-white py-4 mt-5">
    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <h5>电商平台</h5>
                <p class="text-light">为您提供优质的商品和服务</p>
            </div>
            <div class="col-md-6 text-right">
                <p>© 2025 电商平台. -23覃海霞-01邱彦琦-.</p>
            </div>
        </div>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.min.js"></script>
<script>
  // 防止重复提交
  document.addEventListener('DOMContentLoaded', function() {
    const form = document.querySelector('form');
    if (form) {
      form.addEventListener('submit', function() {
        const submitBtn = form.querySelector('button[type="submit"]');
        if (submitBtn) {
          submitBtn.disabled = true;
          submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 处理中...';
        }
      });
    }
  });
</script>
</body>
</html>
