<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>用户登录</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" th:href="@{/css/userIndex.css}"/>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
        }
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 70px);
            padding: 20px;
        }
        .login-form {
            width: 100%;
            max-width: 500px;
        }
    </style>
</head>
<body>
<!-- 导航栏 -->
<nav class="navbar navbar-expand-lg cat-navbar">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">电商平台</a>
        
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/goods/list}">
                        商品列表
                    </a>
                </li>
            </ul>
            
            <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                    <a class="nav-link current-page" th:href="@{/user/toLogin}">
                        登录
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/toLogin}" th:if="${session.auser != null}">后台管理</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="login-container">
    <div class="login-form">
        <div class="card">
            <div class="card-header">
                <h3 class="text-center">用户登录</h3>
            </div>
            <div class="card-body">
                <form th:action="@{/user/login}" th:object="${bUser}" method="post">

                    <!-- 邮箱 -->
                    <div class="form-group">
                        <label for="bemail" class="text-primary">邮箱:</label>
                        <input type="email" class="form-control" id="bemail"
                               th:field="*{bemail}" placeholder="请输入邮箱">
                    </div>

                    <!-- 密码 -->
                    <div class="form-group">
                        <label for="bpwd" class="text-primary">密码:</label>
                        <input type="password" class="form-control" id="bpwd"
                               th:field="*{bpwd}" placeholder="请输入密码">
                    </div>

                    <!-- 错误信息显示 -->
                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                    <div class="form-group text-center mt-5">
                        <button type="submit" class="btn btn-primary btn-lg">登录</button>
                        <button type="reset" class="btn btn-secondary btn-lg ml-3">重置</button>
                    </div>

                    <div class="text-center mt-4">
                        <a th:href="@{/user/toRegister}" class="text-primary font-weight-bold">还没有账号？立即注册</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.min.js"></script>
</body>
</html>
