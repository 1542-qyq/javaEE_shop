<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>用户注册</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" type="text/css" th:href="@{/css/userIndex.css}"/>
  <style>
    body {
      min-height: 100vh;
      margin: 0;
    }
    .register-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 70px);
      padding: 20px;
    }
    .register-form {
      width: 100%;
      max-width: 600px;
    }
    .error-message {
      color: #e74c3c;
      font-size: 12px;
      font-weight: bold;
    }
  </style>
</head>
<body>
<!-- 导航栏 -->
<nav class="navbar navbar-expand-lg cat-navbar">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">电商平台</a>
        
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/goods/list}">
                        商品列表
                    </a>
                </li>
            </ul>
            
            <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                    <a class="nav-link current-page" th:href="@{/user/toRegister}">
                        注册
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/index}" th:if="${session.auser != null}">后台管理</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="register-container">
  <div class="register-form">
    <div class="card">
      <div class="card-header">
        <h3 class="text-center">用户注册</h3>
      </div>
      <div class="card-body">
        <form th:action="@{/user/register}" th:object="${bUser}" method="post" id="registerForm">

        <!-- 邮箱 -->
        <div class="form-group">
          <label for="bemail">邮箱:</label>
          <input type="email" class="form-control" id="bemail"
                 th:field="*{bemail}" placeholder="请输入邮箱">
          <small class="error-message" th:if="${#fields.hasErrors('bemail')}"
                 th:errors="*{bemail}"></small>
        </div>

        <!-- 密码 -->
        <div class="form-group">
          <label for="bpwd">密码:</label>
          <input type="password" class="form-control" id="bpwd"
                 th:field="*{bpwd}" placeholder="请输入密码（至少6位）">
          <small class="error-message" th:if="${#fields.hasErrors('bpwd')}"
                 th:errors="*{bpwd}"></small>
        </div>

        <!-- 确认密码 -->
        <div class="form-group">
          <label for="rebpwd">确认密码:</label>
          <input type="password" class="form-control" id="rebpwd"
                 th:field="*{rebpwd}" placeholder="请再次输入密码">
        </div>

        <!-- 用户名 -->
        <div class="form-group">
          <label for="userName">用户名（可选）:</label>
          <input type="text" class="form-control" id="userName"
                 th:field="*{userName}" placeholder="请输入用户名">
        </div>

        <!-- 错误信息显示 -->
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

        <div class="form-group text-center">
          <button type="submit" class="btn btn-primary btn-lg">注册</button>
          <button type="reset" class="btn btn-secondary btn-lg ml-3">重置</button>
        </div>

        <div class="text-center mt-3">
                  <a th:href="@{/user/toLogin}" class="text-primary font-weight-bold">已有账号？立即登录</a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
<footer class="bg-dark text-white py-4 mt-5">
    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <h5>电商平台</h5>
                <p class="text-light">为您提供优质的商品和服务</p>
            </div>
            <div class="col-md-6 text-right">
                <p>© 2025 电商平台. -23覃海霞-01邱彦琦-.</p>
            </div>
        </div>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.min.js"></script>

<script>
  // 检查邮箱是否已注册
  document.addEventListener('DOMContentLoaded', function() {
    const bemailInput = document.getElementById('bemail');
    bemailInput.addEventListener('blur', function() {
      const email = this.value;
      if (email) {
        fetch('/ch9/user/checkEmail', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
          },
          body: `email=${encodeURIComponent(email)}`
        })
        .then(response => response.text())
        .then(result => {
          // 移除已存在的错误信息
          const existingErrors = bemailInput.nextAll('small.error-message');
          existingErrors.forEach(err => err.remove());
          
          if (result === 'no') {
            const errorSpan = document.createElement('small');
            errorSpan.className = 'error-message';
            errorSpan.textContent = '该邮箱已被注册';
            bemailInput.parentNode.appendChild(errorSpan);
          }
        });
      }
    });
  });
</script>
</body>
</html>
