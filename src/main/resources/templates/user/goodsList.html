<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isSearch ? '搜索结果' : '商品列表'}">商品列表</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" th:href="@{/css/userIndex.css}"/>
    <style>
        /* 商品容器 */
        .goods-container {
            display: flex;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        .goods-card {
            width: 23%;
            margin: 1%;
        }
        .goods-image {
            height: 200px;
            overflow: hidden;
            border-bottom: 2px solid #e6d9ff;
        }
        .goods-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: all 0.3s ease;
        }
        .goods-card:hover .goods-image img {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
<!-- 导航栏 -->
<nav class="navbar navbar-expand-lg cat-navbar">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">电商平台</a>

        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <!-- 用户菜单 -->
            <ul class="navbar-nav mr-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/goods/list}" th:classappend="${!isSearch} ? 'current-page' : ''">
                        商品列表
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/cart/view}">
                        购物车
                        <span th:if="${itemCount > 0}" class="badge badge-danger">
                            <span th:text="${itemCount}"></span>
                        </span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/order/myOrders}">
                        我的订单</a>
                </li>
                <li class="nav-item" th:if="${session.buser != null}">
                    <a class="nav-link" th:href="@{/user/profile}">
                        个人中心
                    </a>
                </li>
            </ul>

            <!-- 搜索框 -->
            <form class="form-inline my-2 my-lg-0 ml-auto" th:action="@{/goods/list}" method="get">
                <input class="form-control mr-sm-2" type="search"
                       name="keyword" placeholder="搜索商品..."
                       th:value="${keyword}" style="width: 200px;">
                <button class="btn btn-primary my-2 my-sm-0" type="submit" style="margin-left: 0.5rem;">搜索</button>
                <a th:href="@{/goods/list}" class="btn btn-outline-primary ml-2" th:if="${isSearch}">
                    查看全部
                </a>
            </form>

            <!-- 登录/退出 -->
            <ul class="navbar-nav ml-3">
                <li class="nav-item" th:unless="${session.buser != null}">
                    <a class="nav-link" th:href="@{/user/toLogin}">
                        登录
                    </a>
                </li>
                <li class="nav-item" th:if="${session.buser != null}">
                    <a class="nav-link" th:href="@{/user/logout}">
                        退出
                    </a>
                </li>
                    <a class="nav-link" th:href="@{/admin/toLogin}">
                        后台管理
                    </a>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <!-- 面包屑导航 -->
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item" th:if="${isSearch}">
                <a th:href="@{/goods/list}">商品列表</a>
            </li>
            <li class="breadcrumb-item active" th:text="${isSearch ? '搜索结果' : '所有商品'}"></li>
        </ol>
    </nav>

    <!-- 搜索头部信息 -->
    <div th:if="${isSearch}" class="search-header">
        <h5>搜索结果</h5>
        <div class="search-info">
            <span th:if="${resultCount > 0}">
                找到 <span class="text-primary font-weight-bold" th:text="${resultCount}"></span> 件与
                "<span class="text-danger" th:text="${keyword}"></span>" 相关的商品
            </span>
            <span th:if="${resultCount == 0}">
                没有找到与 "<span class="text-danger" th:text="${keyword}"></span>" 相关的商品
            </span>
        </div>
    </div>

    <!-- 商品列表 -->
    <div th:if="${resultCount > 0}">
        <div class="goods-container">
            <div th:each="goods : ${goodsList}" class="goods-card">
                <a th:href="@{/goods/detail/{id}(id=${goods.id})}" style="text-decoration: none; color: inherit;">
                    <div class="goods-image">
                        <img th:src="${goods.imageUrl}" th:alt="${goods.gname}"
                             onerror="this.src='/ch9/images/col1.png'">
                    </div>
                    <div class="goods-info">
                        <div class="goods-name" th:text="${goods.gname}"></div>
                        <div class="goods-price" th:text="'¥' + ${#numbers.formatDecimal(goods.gprice, 1, 2)}"></div>
                        <div th:class="${goods.isInStock() ? 'goods-store' : 'no-stock'}">
                            <!-- 这里就是修正的地方！ -->
                            <span th:text="${goods.isInStock() ? '库存: ' + goods.gstore : '已售罄'}"></span>
                        </div>
                        <div th:if="${goods.typename}" class="text-muted small mt-1">
                            <span th:text="${goods.typename}"></span>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <!-- 无结果提示 -->
    <div th:if="${resultCount == 0 and isSearch}" class="no-result">
        <div class="mb-3">
            <i>🔍</i>
        </div>
        <h4>没有找到相关商品</h4>
        <p class="text-muted mt-3">建议您:</p>
        <ul class="text-muted text-left" style="display: inline-block;">
            <li>检查输入的关键词是否正确</li>
            <li>尝试使用其他关键词</li>
            <li>简化关键词，如"手机"代替"智能手机"</li>
        </ul>
        <div class="mt-4">
            <a th:href="@{/goods/list}" class="btn btn-primary mr-2">查看所有商品</a>
            <button class="btn btn-outline-secondary" onclick="history.back()">返回上一页</button>
        </div>
    </div>

    <!-- 分页（只在非搜索模式下显示） -->
    <div th:if="${!isSearch and totalPage > 1}">
        <nav aria-label="Page navigation">
            <ul class="pagination">
                <!-- 上一页 -->
                <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled' : ''">
                    <a class="page-link" th:href="@{/goods/list(page=${currentPage - 1})}">
                        &laquo; 上一页
                    </a>
                </li>

                <!-- 页码 -->
                <li th:each="pageNum : ${#numbers.sequence(1, totalPage)}"
                    class="page-item"
                    th:classappend="${pageNum == currentPage} ? 'active' : ''">
                    <a class="page-link" th:href="@{/goods/list(page=${pageNum})}"
                       th:text="${pageNum}"></a>
                </li>

                <!-- 下一页 -->
                <li class="page-item" th:classappend="${currentPage == totalPage} ? 'disabled' : ''">
                    <a class="page-link" th:href="@{/goods/list(page=${currentPage+1})}">
                        下一页 &raquo;
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <!-- 统计信息 -->
    <div class="text-center text-muted mt-3">
        <span th:if="${!isSearch}">
            共 <span th:text="${totalCount}"></span> 件商品，
            第 <span th:text="${currentPage}"></span> / <span th:text="${totalPage}"></span> 页
        </span>
        <span th:if="${isSearch and resultCount > 0}">
            搜索到 <span th:text="${resultCount}"></span> 件商品
        </span>
    </div>

    <!-- 底部操作 -->
    <div th:if="${isSearch and resultCount > 0}" class="text-center mt-4 mb-5">
        <a th:href="@{/goods/list}" class="btn btn-outline-primary">
            <i>←</i> 返回商品列表
        </a>
    </div>
</div>
<!-- 页脚 -->
<footer class="bg-dark text-white py-4 mt-5">
    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <h5>电商平台</h5>
                <p class="text-light">为您提供优质的商品和服务</p>
            </div>
            <div class="col-md-6 text-right">
                <p>© 2025 电商平台. -23覃海霞-01邱彦琦-.</p>
            </div>
        </div>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.min.js"></script>

<!-- 添加JavaScript处理当前页面高亮 -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // 获取当前页面URL
        var currentUrl = window.location.pathname;

        // 获取所有导航链接
        var navLinks = document.querySelectorAll('.nav-link');

        // 遍历所有链接，检查是否匹配当前页面
        navLinks.forEach(function(link) {
            var linkUrl = link.getAttribute('href');

            // 如果链接的URL包含在当前页面URL中，则添加当前页面类
            if (currentUrl.includes(linkUrl) && linkUrl !== '/') {
                link.classList.add('current-page');
            }
        });

        // 添加点击事件处理
        navLinks.forEach(function(link) {
            link.addEventListener('click', function() {
                // 移除所有链接的当前页面类
                navLinks.forEach(function(navLink) {
                    navLink.classList.remove('current-page');
                });

                // 为当前点击的链接添加当前页面类
                this.classList.add('current-page');
            });
        });

        // 搜索框自动聚焦（如果是搜索页面）
        var urlParams = new URLSearchParams(window.location.search);
        var keyword = urlParams.get('keyword');
        if (keyword) {
            document.querySelector('input[name="keyword"]').focus();
        }

        // 图片加载失败处理
        var images = document.querySelectorAll('img');
        images.forEach(function(img) {
            img.addEventListener('error', function() {
                this.src = '/images/default.png';
            });
        });
    });

    // 清除搜索
    function clearSearch() {
        window.location.href = '[[@{/goods/list}]]';
    }
</script>
</body>
</html>
