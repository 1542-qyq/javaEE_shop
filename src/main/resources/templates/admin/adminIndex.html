<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Index</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" th:href="@{/css/adminIndex.css}"/>
    <style>
        /* 完全覆盖Bootstrap的navbar样式 */
        .cat-navbar {
            background-color: #a59aca !important;
            padding: 1rem 0;
            box-shadow: 0 4px 12px rgba(165, 154, 202, 0.2);
        }

        .cat-navbar .navbar-brand {
            color: #fff !important;
            font-size: 1.8rem;
            font-weight: bold;
        }

        .cat-navbar .navbar-nav .nav-link {
            color: #333 !important;
            font-weight: 700 !important;
            background-color: rgba(255, 255, 255, 0.85) !important;
            border-radius: 30px !important;
            margin: 0 0.5rem;
            padding: 0.6rem 1.2rem !important;
            border: 2px solid transparent !important;
        }

        .cat-navbar .navbar-nav .nav-link:hover {
            color: #333 !important;
            background-color: rgba(255, 255, 255, 1) !important;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border-color: #a59aca !important;
        }

        .cat-navbar .navbar-nav .nav-link.active,
        .cat-navbar .navbar-nav .nav-link:focus,
        .cat-navbar .navbar-nav .nav-link:active,
        .cat-navbar .navbar-nav .nav-link.current-page {
            color: #fff !important;
            background-color: #8a7bb0 !important;
            border-color: #fff !important;
        }

        .cat-navbar .navbar-toggler {
            border-color: rgba(255, 255, 255, 0.5);
        }

        .cat-navbar .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' width='30' height='30' viewBox='0 0 30 30'%3e%3cpath stroke='rgba(255, 255, 255, 0.8)' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
        }
    </style>
</head>

<body>


<nav class="navbar navbar-expand-lg cat-navbar">
    <div class="container">
        <a class="navbar-brand" href="#">后台管理系统</a>

        <button class="navbar-toggler" type="button" data-toggle="collapse"
                data-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/type/list}">
                        类型管理
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/goods/list}">
                        商品管理
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/order/list}">
                        订单管理
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/user/list}">
                        用户管理
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">
                        前台管理
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="welcome-card">
        <h1>欢迎来到后台管理系统</h1>
        <br>
        <p>
            您已成功登录，可以通过上方导航栏管理商品、分类、订单和用户信息。
        </p>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.min.js"></script>

<!-- 添加JavaScript处理当前页面高亮 -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // 获取当前页面URL
        var currentUrl = window.location.pathname;

        // 获取所有导航链接
        var navLinks = document.querySelectorAll('.nav-link');

        // 遍历所有链接，检查是否匹配当前页面
        navLinks.forEach(function(link) {
            var linkUrl = link.getAttribute('href');

            // 如果链接的URL包含在当前页面URL中，则添加当前页面类
            if (currentUrl.includes(linkUrl) && linkUrl !== '/') {
                link.classList.add('current-page');
            }
        });

        // 添加点击事件处理
        navLinks.forEach(function(link) {
            link.addEventListener('click', function() {
                // 移除所有链接的当前页面类
                navLinks.forEach(function(navLink) {
                    navLink.classList.remove('current-page');
                });

                // 为当前点击的链接添加当前页面类
                this.classList.add('current-page');
            });
        });
    });
</script>
</body>
</html>
